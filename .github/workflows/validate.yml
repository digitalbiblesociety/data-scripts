name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet and test tools
        run: |
          go vet ./tools
          go test ./tools
      - name: Validate corpus against schema
        run: go run ./tools -validate
      - name: Verify export artifacts are in sync
        run: go run ./tools -export -check
